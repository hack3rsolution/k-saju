name: Android Preview Build

on:
  push:
    branches:
      - 'android/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: EAS Build (Android APK)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK (preview)
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_RC_API_KEY_ANDROID: ${{ secrets.EXPO_PUBLIC_RC_API_KEY_ANDROID }}
        run: eas build --platform android --profile preview --non-interactive

      - name: Write job summary
        if: always()
        env:
          BUILD_RESULT: ${{ job.status }}
        run: |
          emoji() {
            case "$1" in
              success)   echo "✅ success"   ;;
              failure)   echo "❌ failure"   ;;
              cancelled) echo "🚫 cancelled" ;;
              *)         echo "❓ $1"        ;;
            esac
          }
          {
            echo "## Android Preview Build"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Branch** | \`${{ github.ref_name }}\` |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo "| **Result** | $(emoji "$BUILD_RESULT") |"
          } >> "$GITHUB_STEP_SUMMARY"
